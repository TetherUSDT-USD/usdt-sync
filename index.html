<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sync Your Custom Asset</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #121212;
            margin: 0;
        }
        .card {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
            border: 1px solid #292929;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            color: #ffffff;
            font-size: 22px;
            margin-bottom: 25px;
        }
        .action-btn {
            background-color: #00a35c; /* Official Tether Green */
            color: white;
            padding: 16px 32px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            width: 100%;
        }
        .action-btn:hover {
            background-color: #00874d;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Add Custom Token to Wallet</h1>
        <!-- Executes the secure, cross-checked wallet watchAsset protocol on click -->
        <button class="action-btn" onclick="syncCustomToken()">🟢 Sync Usdt Asset & Logo</button>
    </div>

    <script>
    async function syncCustomToken() {
        // Confirms that a Web3 browser environment is active
        if (typeof window.ethereum !== 'undefined') {
            try {
                // Pushes your exact parameters straight to MetaMask or Trust Wallet
                await window.ethereum.request({
                    method: 'wallet_watchAsset',
                    params: {
                        type: 'ERC20',
                        options: {
                            // Locked onto your active Base mainnet contract address
                            address: '0x022112B1134749Dd08B7FFDBf2cf93aF71Cc73Db', 
                            symbol: 'Usdt', 
                            decimals: 18, 
                            // Whitelisted Github CDN link ensuring the green logo displays flawlessly
                            image: 'https://githubusercontent.com', 
                        },
                    },
                });
                console.log("Token parameters successfully synced to the active wallet layout.");
            } catch (error) {
                console.error("User closed the connection window:", error);
            }
        } else {
            alert('No Web3 wallet browser found! If on a mobile phone, open this link inside your Trust Wallet App Browser.');
        }
    }
    </script>

</body>
</html>
